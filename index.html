<nav>
    <div class="nav-actions">
        <!-- Existing bell icon -->
        <button class="bell-icon">🔔</button>
        <!-- New magnifying glass toggle button -->
        <button class="search-toggle" onclick="toggleSearch()">🔍</button>
    </div>
    <div class="smart-search">
        <div class="logo-only">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="search-input" style="display:none;">
            <input type="text" placeholder="Search..." onkeydown="handleKeyDown(event)">
        </div>
    </div>
</nav>

<script>
function toggleSearch() {
    const searchInput = document.querySelector('.search-input');
    const logoOnly = document.querySelector('.logo-only');
    if (searchInput.style.display === 'none') {
        searchInput.style.display = 'block';
        logoOnly.style.display = 'none';
        document.querySelector('.search-input input').focus();
    } else {
        searchInput.style.display = 'none';
        logoOnly.style.display = 'block';
    }
}

function handleKeyDown(event) {
    if (event.key === 'Escape') {
        toggleSearch();
    } else if (event.ctrlKey || event.metaKey) {
        if (event.key === 'k') {
            event.preventDefault();
            toggleSearch();
        }
    }
}
</script>
